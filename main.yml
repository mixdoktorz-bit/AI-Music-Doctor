name: Python CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  install-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip, requirements, and pyinstaller
        working-directory: AI_MUSIC_DOCTOR V1.3/ai_music_doctor
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app with PyInstaller
        working-directory: AI_MUSIC_DOCTOR V1.3/ai_music_doctor
        run: |
          pyinstaller --name="AI Music Doctor" \
                      --windowed \
                      --noconfirm \
                      --clean \
                      --onedir \
                      main.py
      
      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Music-Doctor-macOS
          path: AI_MUSIC_DOCTOR V1.3/ai_music_doctor/dist/AI Music Doctor.app
