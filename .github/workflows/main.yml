name: Build macOS DMG

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-dmg:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: AI_MUSIC_DOCTOR V1.3/ai_music_doctor
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app with PyInstaller
        working-directory: AI_MUSIC_DOCTOR V1.3/ai_music_doctor/src/
        run: |
          pyinstaller --name="AI Music Doctor" \
                      --windowed \
                      --noconfirm \
                      --clean \
                      --onedir \
                      src/main.py

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        working-directory: AI_MUSIC_DOCTOR V1.3/ai_music_doctor
        run: |
          mkdir -p release
          create-dmg \
            --volname "AI Music Doctor" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            "release/AI-Music-Doctor-v1.3.dmg" \
            "dist/AI Music Doctor.app"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Music-Doctor-macOS-DMG
          path: AI_MUSIC_DOCTOR V1.3/ai_music_doctor/release/*.dmg
