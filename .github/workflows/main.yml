name: Build macOS App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai_music_doctor/requirements.txt
          pip install pyinstaller
      
      - name: Make build script executable
        run: chmod +x build_macos_pyinstaller.sh
      
      - name: Run macOS build
        run: cd AI_MUSIC_DOCTOR && ./build_macos_pyinstaller.sh
      
      - name: Verify build output
        run: |
          if [ -f "dist/AI_Music_Doctor.dmg" ]; then
            echo "sucess DMG created successfully"
            ls -lh dist/AI_Music_Doctor.dmg
          else
            echo "error DMG not found"
            exit 1
          fi
      
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Music-Doctor-macOS
          path: dist/AI_Music_Doctor.dmg
          retention-days: 30
